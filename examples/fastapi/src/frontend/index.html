<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zuv fastapi example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1rem; color: #222; }
    h1 { margin-bottom: 0.25rem; }
    code, pre { background: #f4f4f4; padding: 0.1rem 0.35rem; border-radius: 4px; }
    pre { padding: 0.75rem; overflow: auto; }
    .row { display: flex; gap: .5rem; margin: 1rem 0; }
    button { padding: .5rem 1rem; border: 1px solid #888; background: #fff; cursor: pointer; border-radius: 4px; }
    .pill { display: inline-block; padding: .15rem .55rem; border-radius: 999px; font-size: .85rem; }
    .ok { background: #d6f5d6; color: #1c5d1c; }
    .err { background: #fbd4d4; color: #7a1c1c; }
    .switch-card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1.5rem 0; }
    .switch-card h2 { margin: 0 0 .5rem; font-size: 1.1rem; }
    .switch-state { font-weight: bold; }
    .switch-state.on { color: #1c5d1c; }
    .switch-state.off { color: #7a1c1c; }
  </style>
</head>
<body>
  <h1>zuv fastapi example</h1>
  <p>Frontend served from inside the <code>.zuv</code> bundle (or from a sibling
     <code>frontend/</code> folder if present).</p>

  <div class="row">
    <button id="health">GET /api/health</button>
    <button id="info">GET /api/info</button>
    <span id="status"></span>
  </div>

  <pre id="out">Click a button to call the API.</pre>

  <div class="switch-card">
    <h2>Persistent switch (volume demo)</h2>
    <p>Stored in <code>data/settings.json</code> on the persistent volume. Survives version upgrades.</p>
    <p>Current value: <span id="switchState" class="switch-state">loading...</span></p>
    <div class="row">
      <button id="refreshSwitch">Refresh</button>
      <button id="toggleSwitch">Toggle</button>
      <span id="switchStatus" class="pill"></span>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function request(pill, path, init) {
      pill.textContent = "...";
      pill.className = "pill";
      try {
        const r = await fetch(path, init);
        const data = await r.json();
        pill.textContent = r.status + " OK";
        pill.className = "pill ok";
        return data;
      } catch (e) {
        pill.textContent = "error";
        pill.className = "pill err";
        return { _error: String(e) };
      }
    }

    const out = $("out"), status = $("status");
    const showJson = async (path) => {
      out.textContent = JSON.stringify(await request(status, path), null, 2);
    };
    $("health").onclick = () => showJson("/api/health");
    $("info").onclick = () => showJson("/api/info");

    const switchState = $("switchState"), switchStatus = $("switchStatus");
    let currentSwitch = null;

    function render(value) {
      currentSwitch = value;
      switchState.textContent = value ? "ON" : "OFF";
      switchState.className = "switch-state " + (value ? "on" : "off");
    }

    async function loadSwitch() {
      const data = await request(switchStatus, "/api/settings");
      if (!data._error) render(data.switch);
    }

    async function toggleSwitch() {
      if (currentSwitch === null) return loadSwitch();
      const data = await request(switchStatus, "/api/settings", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ switch: !currentSwitch }),
      });
      if (!data._error) render(data.switch);
    }

    $("refreshSwitch").onclick = loadSwitch;
    $("toggleSwitch").onclick = toggleSwitch;
    loadSwitch();
  </script>
</body>
</html>
