<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zuv fastapi example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1rem; color: #222; }
    h1 { margin-bottom: 0.25rem; }
    code, pre { background: #f4f4f4; padding: 0.1rem 0.35rem; border-radius: 4px; }
    pre { padding: 0.75rem; overflow: auto; }
    .row { display: flex; gap: .5rem; margin: 1rem 0; }
    button { padding: .5rem 1rem; border: 1px solid #888; background: #fff; cursor: pointer; border-radius: 4px; }
    .pill { display: inline-block; padding: .15rem .55rem; border-radius: 999px; font-size: .85rem; }
    .ok { background: #d6f5d6; color: #1c5d1c; }
    .err { background: #fbd4d4; color: #7a1c1c; }
  </style>
</head>
<body>
  <h1>zuv fastapi example</h1>
  <p>Frontend served from inside the <code>.zuv</code> bundle (or from a sibling
     <code>frontend/</code> folder if present).</p>

  <div class="row">
    <button id="health">GET /api/health</button>
    <button id="info">GET /api/info</button>
    <span id="status"></span>
  </div>

  <pre id="out">Click a button to call the API.</pre>

  <script>
    const out = document.getElementById("out");
    const status = document.getElementById("status");
    async function call(path) {
      status.textContent = "...";
      status.className = "pill";
      try {
        const r = await fetch(path);
        const data = await r.json();
        out.textContent = JSON.stringify(data, null, 2);
        status.textContent = r.status + " OK";
        status.className = "pill ok";
      } catch (e) {
        out.textContent = String(e);
        status.textContent = "error";
        status.className = "pill err";
      }
    }
    document.getElementById("health").onclick = () => call("/api/health");
    document.getElementById("info").onclick = () => call("/api/info");
  </script>
</body>
</html>
