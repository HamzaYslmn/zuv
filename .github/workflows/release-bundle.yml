name: release bundle

# Build a zuv bundle and upload it as an asset to the `latest` release when a
# commit message contains `release <name>`. Multi-bundle repos work the same
# way: `release fastapi`, `release dashboard`, etc. — each commit re-uploads
# only its own asset (with --clobber), so other bundles in the release stay
# untouched and their recipients aren't prompted to update.
#
# Example: a commit message of "release fastapi" builds examples/fastapi/
# and replaces fastapi.zuv.py in the `latest` release. Recipients' bundles,
# built with
#     zuv build examples/fastapi --update-repo <user>/<repo>
# will see the new asset id on next startup and prompt to install.

on:
  push:
    branches: [main]

permissions:
  contents: write  # we create/update releases

jobs:
  release:
    if: contains(github.event.head_commit.message, 'release fastapi')
    runs-on: ubuntu-latest

    steps:
      - name: parse bundle name from commit message
        id: parse
        run: |
          msg='${{ github.event.head_commit.message }}'
          name=$(echo "$msg" | sed -n 's/.*release \([A-Za-z0-9_-]\+\).*/\1/p' | head -1)
          if [ -z "$name" ]; then
            echo "no 'release <name>' token in commit message; skipping"
            exit 78  # neutral
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "building bundle: $name"

      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - name: install zuv
        run: |
          # If the checked-out repo contains zuv's own source (src/pyproject.toml
          # with name = "zuv"), install from there so the workflow uses the
          # exact code being committed. Otherwise install the published release.
          if [ -f src/pyproject.toml ] && grep -q '^name = "zuv"' src/pyproject.toml; then
            echo "dogfood: installing zuv from local source"
            uv tool install --force ./src
          else
            uv tool install zuv
          fi

      - name: build bundle
        run: |
          name='${{ steps.parse.outputs.name }}'
          # Convention: source lives at examples/<name>/. Adjust to match
          # your layout (e.g. apps/<name>/ or just <name>/).
          # $GITHUB_REPOSITORY = "owner/repo"; pointing the bundle at its own
          # home so recipients auto-fetch future builds from this release.
          zuv build "examples/$name" \
            -o "dist/$name.zuv.py" \
            --update-repo "$GITHUB_REPOSITORY"

      - name: upload to `latest` release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          name='${{ steps.parse.outputs.name }}'
          set -e
          # Create the rolling `latest` release if it doesn't exist yet.
          gh release view latest >/dev/null 2>&1 || gh release create latest \
            --title "latest" \
            --notes "Rolling builds of zuv bundles. Re-uploaded on each \`release <name>\` commit." \
            --latest
          # Replace the existing asset of the same name (or add it).
          gh release upload latest "dist/$name.zuv.py" --clobber
